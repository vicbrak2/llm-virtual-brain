services:
  brain:
    build: .
    container_name: brain
    ports:
      - "8901:8901"
    env_file:
      - .env
    volumes:
      # Perfiles: los sub-agentes creados desde la UI quedan persistidos aquí
      - ./profiles:/app/profiles
      # Datos: uploads TXT, registros y estado de perfiles
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8901/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Túnel público para los webhooks de Meta (quick tunnel: la URL cambia si
  # el contenedor se recrea — ver VERIFICACION_NEGOCIO_META.md para actualizarla)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: brain-tunnel
    command: tunnel --url http://brain:8901
    depends_on:
      - brain
    restart: unless-stopped
