# Perfil general: asistente de conocimiento sobre documentos subidos.
description: "Asistente general — pregunta lo que quieras; usa tus TXT subidos como base de conocimiento"
app_name: "brain_general"

# Cadena orquestada CALIDAD-PRIMERO: se usan en orden y se rota al siguiente si
# uno falla. Los providers sin API key en el entorno se omiten automáticamente.
providers:
  - name: "groq"
    api_key: "${GROQ_API_KEY}"
    model: "openai/gpt-oss-120b"
  # Orden por costo tras groq (gratis): openrouter ($0.08/$0.45 por M) es mas
  # barato que cerebras ($0.35/$0.75) — se prueba primero.
  - name: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
    model: "nvidia/nemotron-3-super-120b-a12b"
    extra_headers:
      HTTP-Referer: "https://brain.local"
      X-Title: "Brain Chat"
  - name: "cerebras"
    api_key: "${CEREBRAS_API_KEY}"
    extra_body:
      reasoning_effort: "high"
  - name: "hf"
    api_key: "${HF_TOKEN}"

prompts:
  type: "dict"
  config:
    prompts:
      chat: |
        Eres Brain, un asistente conversacional claro y directo.
        Si hay documentos en la BASE DE CONOCIMIENTO, apóyate en ellos y cítalos por nombre.
        Si no sabes algo, dilo. Responde en el idioma del usuario.

# Registro de TXT subidos en Google Sheets vía GAS (URL por env BRAIN_GAS_URL).
storage:
  gas_url: "${BRAIN_GAS_URL}"
  sheet: "Documentos"

timeout_seconds: 30
