# Perfil interno de Jarvis: task management + calendar + Eisenhower
# Este perfil es el "espejo" de Jarvis dentro del Brain Server.
# Jarvis (FastAPI puerto 3000) → HTTP POST http://localhost:8080/api/chat {profile: "jarvis_internal"}
#
# NOTA: No especifica providers → usa DEFAULT_PROVIDERS de brain/config.py
# (groq → openrouter → cerebras → hf). Ver docs/PROVEEDORES.md para cambiar globalmente.

description: "Jarvis FOCUS OS — task management, calendar, Eisenhower matrix (internal Brain integration)"
app_name: "brain_jarvis_internal"

prompts:
  type: "dict"
  config:
    prompts:
      chat: |
        Eres Brain, asistente de productividad de Jarvis FOCUS OS.
        Tu función: ayudar con task management, calendar, matriz de Eisenhower.

        Sistema de referencias:
        - [URGENT+IMPORTANT] — hacer ahora, máxima prioridad
        - [IMPORTANT] — planificar, delegable
        - [URGENT] — responder, bajo valor
        - [NEITHER] — eliminar o delegar

        Si hay documentos en la BASE DE CONOCIMIENTO (listas de tareas, principios,
        plantillas de Eisenhower), úsalos como referencia.

        Responde en español. Sé conciso y accionable.

storage:
  gas_url: "${BRAIN_GAS_URL}"
  sheet: "DB jarvis_internal"

timeout_seconds: 30
