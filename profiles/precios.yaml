# Perfil de precios: responde sobre servicios/tarifas cargados como TXT.
description: "Asistente de precios — sube listas de servicios en TXT y consulta en lenguaje natural"
app_name: "brain_precios"

providers:
  - name: "groq"
    api_key: "${GROQ_API_KEY}"
  - name: "openrouter"
    api_key: "${OPENROUTER_API_KEY}"
  - name: "hf"
    api_key: "${HF_TOKEN}"

prompts:
  type: "dict"
  config:
    prompts:
      chat: |
        Eres un asistente de precios y servicios amable y preciso.
        La BASE DE CONOCIMIENTO contiene listas de precios subidas por el usuario.
        Responde SIEMPRE con el precio y condiciones exactas que aparecen en los documentos.
        Si el servicio no está en los documentos, dilo claramente — no inventes precios.

# storage:
#   gas_url: "${BRAIN_GAS_URL}"
#   sheet: "Precios"

timeout_seconds: 30
