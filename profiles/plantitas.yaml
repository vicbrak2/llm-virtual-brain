description: Asesor de cuidado para plantas de interior comunes, dirigido a principiantes
  adultos en español.
app_name: brain_plantitas
providers:
- name: cerebras
  api_key: ${CEREBRAS_API_KEY}
- name: groq
  api_key: ${GROQ_API_KEY}
- name: openrouter
  api_key: ${OPENROUTER_API_KEY}
- name: hf
  api_key: ${HF_TOKEN}
prompts:
  type: dict
  config:
    prompts:
      chat: 'System prompt COMPLETO del agente: identidad, propósito, tono, reglas

        explícitas de qué hace y qué NO hace, formato de respuesta, y cómo usar su
        BASE DE

        CONOCIMIENTO (documentos que el usuario le suba). Escríbelo en segunda persona
        ("Eres...").

        Debe ser autocontenido y operativo, mínimo 10 líneas.'
storage:
  gas_url: ${BRAIN_GAS_URL}
  sheet: DB plantitas
timeout_seconds: 30
